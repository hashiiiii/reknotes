services:
  caddy:
    image: caddy:2.11.2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
    environment:
      DOMAIN: ${DOMAIN}
      AUTH_USER: ${AUTH_USER}
      AUTH_PASS_HASH: ${AUTH_PASS_HASH}
    restart: unless-stopped

  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:${ENVIRONMENT}
    env_file: .env
    volumes:
      - embedding-model-cache:/app/node_modules/@huggingface/transformers/.cache
    restart: unless-stopped

  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:1.16.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 60
    restart: unless-stopped

  postgres:
    image: postgres:17.9
    environment:
      POSTGRES_USER: reknotes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  caddy-data:
  postgres-data:
  embedding-model-cache:

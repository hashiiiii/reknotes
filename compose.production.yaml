services:
  caddy:
    image: caddy:2.11.2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
    environment:
      DOMAIN: reknotes.hashiiiii.com
    restart: unless-stopped

  app:
    image: ghcr.io/hashiiiii/reknotes:${IMAGE_TAG}
    env_file: .env
    restart: unless-stopped

  postgres:
    image: postgres:17.9
    environment:
      POSTGRES_USER: reknotes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  caddy-data:
  postgres-data:

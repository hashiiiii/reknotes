services:
  caddy:
    image: caddy:2.11.2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
    environment:
      DOMAIN: reknotes.hashiiiii.com
    restart: unless-stopped

  app:
    image: ghcr.io/hashiiiii/reknotes:${IMAGE_TAG}
    environment:
      ENVIRONMENT: production
      DEPLOYMENT: remote
      DATABASE_URL: postgresql://reknotes:${POSTGRES_PASSWORD}@postgres:5432
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: reknotes
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    restart: unless-stopped

  postgres:
    image: postgres:17.9
    environment:
      POSTGRES_USER: reknotes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  caddy-data:
  postgres-data:

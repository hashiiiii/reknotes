name: Refactor

on:
  schedule:
    # 01:00 JST = 16:00 UTC (previous day)
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  analyze-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/refactor-analyst-frontend"
          claude_args: |
            --model opus[1m]
            --max-turns 30

  analyze-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/refactor-analyst-backend"
          claude_args: |
            --model opus[1m]
            --max-turns 30

  build:
    needs: [analyze-frontend, analyze-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: reknotes
          POSTGRES_PASSWORD: reknotes
          POSTGRES_DB: reknotes
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U reknotes"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      ENVIRONMENT: test
      DEPLOYMENT: local
      DATABASE_URL: postgresql://reknotes:reknotes@localhost:5432/reknotes
      R2_ENDPOINT: http://localhost:9000
      R2_ACCESS_KEY_ID: dummy
      R2_SECRET_ACCESS_KEY: dummy
      R2_BUCKET_NAME: reknotes-test

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run database migrations
        run: bun run migrate

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/refactor-builder"
          claude_args: |
            --model opus[1m]
            --max-turns 50

name: Backup

on:
  schedule:
    - cron: "0 18 * * *" # 18:00 UTC = 03:00 JST
  workflow_dispatch:
    inputs:
      environment:
        description: "ENVIRONMENT"
        type: choice
        options:
          - development
          - production

env:
  TZ: Asia/Tokyo

jobs:
  dump:
    runs-on: ubuntu-latest
    # backup 用の secret は production / development の GitHub Environment に格納されている。
    # environment を宣言しないと secrets.* が空文字に解決され dump が DATABASE_URL is required で落ちる。
    # schedule (cron) 起動時は inputs.environment が空なので production にフォールバックする。
    environment: ${{ inputs.environment || 'production' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install packages
        run: bun install --frozen-lockfile

      - name: Run dump
        env:
          ENVIRONMENT: ${{ inputs.environment || 'production' }}
          DEPLOYMENT: remote
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          BACKUP_S3_ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
          BACKUP_S3_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          BACKUP_S3_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          BACKUP_S3_BUCKET_NAME: ${{ secrets.BACKUP_S3_BUCKET_NAME }}
        run: bun run dump

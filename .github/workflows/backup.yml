name: Backup

on:
  schedule:
    - cron: "0 18 * * *" # 18:00 UTC = 03:00 JST
  workflow_dispatch:
    inputs:
      environment:
        description: "ENVIRONMENT"
        type: choice
        options:
          - development
          - production

env:
  BACKUP_S3_BUCKET_NAME: ${{ secrets.BACKUP_S3_BUCKET_NAME }}
  TZ: Asia/Tokyo

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install packages
        run: bun install --frozen-lockfile

      - name: Run dump
        env:
          # schedule (cron) 起動時は inputs.environment が空
          ENVIRONMENT: ${{ inputs.environment || 'production' }}
          DEPLOYMENT: remote
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          BACKUP_S3_ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
          BACKUP_S3_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          BACKUP_S3_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bun run dump

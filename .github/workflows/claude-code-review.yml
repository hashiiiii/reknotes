name: Claude Code Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.user.type == 'User') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/claude-review'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      ALLOWED_TOOLS: >-
        Read,Glob,Grep,Task,
        mcp__github__get_pull_request_diff,
        mcp__github__get_pull_request,
        mcp__github__get_pull_request_files,
        mcp__github__get_pull_request_comments,
        mcp__github__get_pull_request_reviews,
        mcp__github__get_pull_request_review_comments,
        mcp__github__get_file_contents,
        mcp__github_inline_comment__create_inline_comment
      DISALLOWED_TOOLS: >-
        mcp__github__create_pending_pull_request_review,
        mcp__github__add_comment_to_pending_review,
        mcp__github__submit_pending_pull_request_review

    steps:
      - name: React to trigger comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR info
        id: pr-info
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            let pr;
            if (context.eventName === 'pull_request') {
              pr = context.payload.pull_request;
            } else {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number,
              });
              pr = data;
            }
            return { number: pr.number, head_ref: pr.head.ref };

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ fromJSON(steps.pr-info.outputs.result).head_ref }}
          fetch-depth: 1

      - name: Delete previous bot comments
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = ${{ fromJSON(steps.pr-info.outputs.result).number }};

            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner, repo, pull_number },
            );
            for (const c of reviewComments) {
              if (c.user.login === 'claude[bot]') {
                await github.rest.pulls.deleteReviewComment({
                  owner, repo, comment_id: c.id,
                });
              }
            }

            const issueComments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pull_number },
            );
            for (const c of issueComments) {
              if (c.user.login === 'claude[bot]') {
                await github.rest.issues.deleteComment({
                  owner, repo, comment_id: c.id,
                });
              }
            }

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@f4fb5c6cdccc1ee7af63692f5d08d56efaa64cc8 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude"
          prompt: |
            /code-review
            REPO: ${{ github.repository }}
            PR: #${{ fromJSON(steps.pr-info.outputs.result).number }}
          claude_args: |
            --max-turns 30
            --append-system-prompt "Output all review comment body text in **Japanese**."
            --allowedTools "${{ env.ALLOWED_TOOLS }}"
            --disallowedTools "${{ env.DISALLOWED_TOOLS }}"

      # Requires: Settings > Actions > General > "Allow GitHub Actions to create and approve pull requests"
      - name: Post approval if no inline comments
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = ${{ fromJSON(steps.pr-info.outputs.result).number }};

            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner, repo, pull_number },
            );
            const hasBotComments = reviewComments.some(c => c.user.login === 'claude[bot]');

            if (!hasBotComments) {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number,
                event: 'APPROVE',
                body: 'Code review completed — no issues found.',
              });
            }

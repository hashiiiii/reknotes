name: CI

on:
  pull_request:

env:
  ENVIRONMENT: test
  DEPLOYMENT: local
  DOMAIN: localhost
  GITHUB_REPOSITORY: dummy/reknotes
  DATABASE_URL: postgresql://reknotes:reknotes@localhost:5432
  S3_ENDPOINT: dummy
  S3_ACCESS_KEY_ID: dummy
  S3_SECRET_ACCESS_KEY: dummy
  S3_BUCKET_NAME: reknotes-test
  CLOUDFLARE_ACCOUNT_ID: dummy
  CLOUDFLARE_API_TOKEN: dummy
  OAUTH2_PROXY_CLIENT_ID: dummy
  OAUTH2_PROXY_CLIENT_SECRET: dummy
  OAUTH2_PROXY_COOKIE_SECRET: dummy
  OAUTH2_PROXY_GITHUB_USER: dummy

jobs:
  test:
    runs-on: ubuntu-latest
    services: &postgres-service
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: reknotes
          POSTGRES_PASSWORD: reknotes
          POSTGRES_DB: reknotes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U reknotes"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install packages
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run migrate -- --apply

      - name: Run tests
        run: bun test

  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install packages
        run: bun install --frozen-lockfile

      - name: Run lint & typecheck
        run: bun run check

      - name: Run build
        run: bun run build

  destructive-check:
    runs-on: ubuntu-latest
    services: *postgres-service
    steps:
      - uses: actions/checkout@v6
        with:
          # feature と base とでブランチを行き来するため全履歴を取得しておく
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Apply base branch schema to plain DB
        run: |
          git checkout origin/${{ github.base_ref }}
          bun install --frozen-lockfile
          bun run migrate -- --apply

      - name: Detect destructive diff against base branch
        run: |
          git checkout -
          bun install --frozen-lockfile
          bun run migrate -- --check

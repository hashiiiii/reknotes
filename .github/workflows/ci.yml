name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: reknotes
          POSTGRES_PASSWORD: reknotes
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U reknotes"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      ENVIRONMENT: test
      DEPLOYMENT: local
      DATABASE_URL: postgresql://reknotes:reknotes@localhost:5432
      # S3StorageProvider のコンストラクタ用ダミー値
      R2_ENDPOINT: http://localhost:9000
      R2_ACCESS_KEY_ID: dummy
      R2_SECRET_ACCESS_KEY: dummy
      R2_BUCKET_NAME: reknotes-test

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run migrate

      - name: Run tests
        run: bun test

      - name: Lint & typecheck
        run: bun run check

      - name: Build
        run: bun run build

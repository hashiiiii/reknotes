name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - development
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
      # BuildKit の docker-container driver の builder を立てる。これが無いと
      # runner デフォルトの docker driver が使われ、後続の cache-to: type=gha が
      # silent に無視されて毎回フルビルドになる。
      # see:
      #   - https://github.com/docker/setup-buildx-action
      #   - https://docs.docker.com/build/builders/drivers/
      #   - https://docs.docker.com/build/cache/backends/gha/
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI image tag は slash を許さないので、 feat/foo のような ref から dispatch された時用に
      # github.ref_name の "/" を "-" に置換する。 main や v1.0.0 では no-op。
      - name: Compute image tag
        id: image
        run: echo "tag=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install packages
        run: bun install --frozen-lockfile

      - name: Run migration
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          DEPLOYMENT: remote
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bun run migrate -- --apply

      # SSH 鍵と .env を runner 上に組み立て、 scp で .env を送り、 ssh で docker compose を再起動する。
      - name: Deploy to VM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

          cat > /tmp/.env << 'EOF'
          ENVIRONMENT=${{ inputs.environment }}
          DEPLOYMENT=remote
          IMAGE_TAG=${{ steps.image.outputs.tag }}
          DOMAIN=${{ secrets.DOMAIN }}
          GITHUB_REPOSITORY=${{ github.repository }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          OAUTH2_PROXY_CLIENT_ID=${{ secrets.OAUTH2_PROXY_CLIENT_ID }}
          OAUTH2_PROXY_CLIENT_SECRET=${{ secrets.OAUTH2_PROXY_CLIENT_SECRET }}
          OAUTH2_PROXY_COOKIE_SECRET=${{ secrets.OAUTH2_PROXY_COOKIE_SECRET }}
          OAUTH2_PROXY_GITHUB_USER=${{ github.repository_owner }}
          EOF

          scp -i ~/.ssh/deploy_key /tmp/.env ubuntu@${{ secrets.VM_HOST }}:~/reknotes/.env
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.VM_HOST }} '
            cd ~/reknotes &&
            git pull &&
            docker compose -f compose.remote.yaml pull &&
            docker compose -f compose.remote.yaml up -d --remove-orphans &&
            docker image prune -f
          '

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - development
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # BuildKit の docker-container driver の builder を立てる。これが無いと
      # runner デフォルトの docker driver が使われ、後続の cache-to: type=gha が
      # silent に無視されて毎回フルビルドになる。
      # see:
      #   - https://github.com/docker/setup-buildx-action
      #   - https://docs.docker.com/build/builders/drivers/
      #   - https://docs.docker.com/build/cache/backends/gha/
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI image tag は slash を許さないので、 feat/foo のような ref から dispatch された時用に
      # github.ref_name の "/" を "-" に置換する。 main や v1.0.0 では no-op。
      - name: Compute image tag
        id: image
        run: echo "tag=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"

      - name: Install packages
        run: bun install --frozen-lockfile

      # .env を 1 度だけ組み立てる。migrate は Bun が cwd の .env を自動 load し、
      # 同じファイルを VM にも scp する (変数リストの二重定義を避ける)。
      # BACKUP_S3_* は VM 上での手動 restore 用に含める (backup 未使用なら secret が
      # 空のまま空行になるだけで、アプリ稼働には影響しない)。docs/BACKUP.md 参照。
      - name: Build .env
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=${{ inputs.environment }}
          DEPLOYMENT=remote
          IMAGE_TAG=${{ steps.image.outputs.tag }}
          DOMAIN=${{ secrets.DOMAIN }}
          GITHUB_REPOSITORY=${{ github.repository }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          BACKUP_S3_ENDPOINT=${{ secrets.BACKUP_S3_ENDPOINT }}
          BACKUP_S3_ACCESS_KEY_ID=${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          BACKUP_S3_SECRET_ACCESS_KEY=${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          BACKUP_S3_BUCKET_NAME=${{ secrets.BACKUP_S3_BUCKET_NAME }}
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          OAUTH2_PROXY_CLIENT_ID=${{ secrets.OAUTH2_PROXY_CLIENT_ID }}
          OAUTH2_PROXY_CLIENT_SECRET=${{ secrets.OAUTH2_PROXY_CLIENT_SECRET }}
          OAUTH2_PROXY_COOKIE_SECRET=${{ secrets.OAUTH2_PROXY_COOKIE_SECRET }}
          OAUTH2_PROXY_GITHUB_USER=${{ github.repository_owner }}
          EOF

      - name: Run migration
        run: bun run migrate --apply

      # SSH 鍵を組み立て、上で作った .env を scp で送り、ssh で docker compose を再起動する。
      - name: Deploy to VM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

          scp -i ~/.ssh/deploy_key .env ubuntu@${{ secrets.VM_HOST }}:~/reknotes/.env
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.VM_HOST }} '
            cd ~/reknotes &&
            git pull &&
            docker compose -f compose.remote.yaml pull &&
            docker compose -f compose.remote.yaml up -d --remove-orphans &&
            docker image prune -f
          '

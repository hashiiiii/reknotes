services:
  postgres:
    image: postgres:18.2@sha256:a688ae5c99f86c1424e046ace0de890608cc0ddb5ec8ef72a6ff8305fdc8f4d2
    environment:
      POSTGRES_USER: reknotes
      POSTGRES_PASSWORD: reknotes
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  minio:
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z@sha256:a72bf37c235a83a73890d2a46c5b36801fed61c335175e0396070bf84a8bbb98
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # backup は任意機能。既定の `docker compose up` では起動しない。
  # `bun run dump` / `restore` をローカルで試すときだけ `--profile backup` を付ける。
  minio-backup:
    profiles: ["backup"]
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: ${BACKUP_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${BACKUP_S3_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-backup-data:/data

volumes:
  postgres-data:
  minio-data:
  minio-backup-data:

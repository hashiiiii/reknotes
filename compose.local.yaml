services:
  postgres:
    image: postgres:18.2@sha256:a688ae5c99f86c1424e046ace0de890608cc0ddb5ec8ef72a6ff8305fdc8f4d2
    environment:
      POSTGRES_USER: reknotes
      POSTGRES_PASSWORD: reknotes
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-backup:
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: ${BACKUP_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${BACKUP_S3_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-backup-data:/data

volumes:
  postgres-data:
  minio-data:
  minio-backup-data:

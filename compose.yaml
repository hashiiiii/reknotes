services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: reknotes_dev
      POSTGRES_USER: reknotes
      POSTGRES_PASSWORD: reknotes
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reknotes -d reknotes_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
